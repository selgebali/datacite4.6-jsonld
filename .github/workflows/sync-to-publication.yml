name: Sync to publication repo (schema.datacite.org-linked-data)

# This workflow is the implementation of "single-source publish":
#
#   - This repository (datacite-metadata-toolkit) is the source of truth
#     for the DataCite linked-data namespace.
#   - schema.datacite.org-linked-data is a flat publication mirror.
#
# Every push to main that touches a synced subtree opens (or updates)
# an automated pull request against schema.datacite.org-linked-data.
# A human reviews the diff before merging. After merge, that repo's
# existing AWS S3 deployment workflow (deploy.yml, owned separately)
# publishes the namespace.

on:
  push:
    branches: [main]
    paths:
      - 'rdf-vocabulary-staging/**'
      - 'rdf-build-scripts/**'
      - '.github/workflows/apply-datacite-release-plan.yml'
      - '.github/workflows/detect-datacite-release.yml'
      - '.github/workflows/release-snapshot.yml'
      - '.github/workflows/deploy-pages.yml'
      - '.github/workflows/sync-to-publication.yml'
  workflow_dispatch:

concurrency:
  group: sync-to-publication
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PUBLICATION_REPO: datacite/schema.datacite.org-linked-data
      SYNC_BRANCH: sync-from-toolkit
    steps:
      - name: Checkout source repo (this repo)
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout publication repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PUBLICATION_REPO }}
          token: ${{ secrets.PUBLICATION_SYNC_TOKEN }}
          path: target
          fetch-depth: 0

      - name: Mirror namespace artifacts (flatten rdf-vocabulary-staging)
        run: |
          set -euo pipefail
          for d in class property vocab context manifest dist; do
            if [ -d "source/rdf-vocabulary-staging/$d" ]; then
              rsync -a --delete "source/rdf-vocabulary-staging/$d/" "target/$d/"
            fi
          done

      - name: Mirror build scripts (rdf-build-scripts -> scripts)
        run: |
          set -euo pipefail
          rsync -a --delete "source/rdf-build-scripts/" "target/scripts/"

      - name: Mirror selected workflows with path rewrites
        # Copies four workflows into target/.github/workflows/ and rewrites
        # paths so they work in the flat publication layout. Does NOT touch
        # target/.github/workflows/deploy.yml (AWS S3 deploy, owned separately).
        run: |
          set -euo pipefail
          mkdir -p target/.github/workflows
          for wf in apply-datacite-release-plan.yml detect-datacite-release.yml release-snapshot.yml deploy-pages.yml; do
            src="source/.github/workflows/$wf"
            if [ ! -f "$src" ]; then
              echo "Skipping $wf (not present in source)"
              continue
            fi
            sed \
              -e 's|rdf-build-scripts/|scripts/|g' \
              -e 's|rdf-vocabulary-staging/||g' \
              "$src" > "target/.github/workflows/$wf"
          done

      - name: Show planned diff (informational)
        working-directory: target
        run: |
          git status --short | head -40
          echo "---"
          git diff --stat | tail -20 || true

      - name: Open or update sync pull request
        uses: peter-evans/create-pull-request@v6
        with:
          path: target
          token: ${{ secrets.PUBLICATION_SYNC_TOKEN }}
          branch: ${{ env.SYNC_BRANCH }}
          base: main
          delete-branch: false
          commit-message: |
            sync from datacite-metadata-toolkit@${{ github.sha }}

            Mirrors namespace artifacts and build scripts from the source
            repo. Auto-generated by the sync-to-publication workflow.
          title: "Auto-sync: namespace from datacite-metadata-toolkit"
          body: |
            Mirrors the latest `main` of [datacite-metadata-toolkit](https://github.com/${{ github.repository }}) into this publication repo.

            **Source commit:** [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ### Synced
            - `rdf-vocabulary-staging/{class,property,vocab,context,manifest,dist}/` → repo root
            - `rdf-build-scripts/` → `scripts/`
            - `.github/workflows/{apply-datacite-release-plan,detect-datacite-release,release-snapshot,deploy-pages}.yml` (path tokens `rdf-build-scripts/` → `scripts/`, `rdf-vocabulary-staging/` → root)

            ### Intentionally NOT touched
            - `.github/workflows/deploy.yml` (AWS S3 deployment, owned by another team)
            - `mappings/`, `validation-and-conversion/`, `website/` (kept in source repo only)

            ### Review checklist
            - [ ] `dist/datacite-*.{jsonld,ttl,rdf}` regenerates cleanly
            - [ ] `manifest/datacite-*.json` validates
            - [ ] No unexpected churn in `class/`, `property/`, `vocab/`
            - [ ] Workflow path rewrites look correct (no leftover `rdf-build-scripts/` or `rdf-vocabulary-staging/`)

            This PR is reopened or updated automatically on every push to `main` in the source repo. Close it without merging if you want to skip a sync; the next push will reopen it.
          labels: |
            sync
            automated
