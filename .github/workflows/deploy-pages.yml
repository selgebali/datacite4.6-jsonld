name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'rdf-vocabulary-staging/**'
      - 'rdf-build-scripts/**'
      - 'website/**'
      - 'validation-and-conversion/schemas/schema-profiles/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON Schema profiles
        run: |
          npm install -g ajv-cli@5
          for f in validation-and-conversion/schemas/schema-profiles/*.json validation-and-conversion/schemas/schema-profiles/*.jsonld; do
            echo "=== $f ==="
            # Each profile declares its own draft via $schema; dispatch the right --spec.
            # Files without $schema (e.g. SKOS-only .jsonld fragments) are skipped.
            spec=$(node -e "const s=(JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))['\$schema'])||''; if(!s){process.stdout.write('')} else if(s.includes('2020')){process.stdout.write('draft2020')} else if(s.includes('2019')){process.stdout.write('draft2019')} else {process.stdout.write('draft7')}" "$f")
            if [ -z "$spec" ]; then
              echo "  (no \$schema — skipping non-schema file)"
              continue
            fi
            # Work around ajv-cli's extension dispatch quirk for .jsonld → copy to .json
            tmp=$(mktemp --suffix=.json)
            cp "$f" "$tmp"
            ajv-cli --strict=false --spec="$spec" compile -s "$tmp"
            rm -f "$tmp"
          done

      - name: Build site
        run: |
          # Copy staging vocabulary as the website base
          cp -r rdf-vocabulary-staging/ _site/

          # Generate section index pages into the site tree
          # (script reads class/, property/, vocab/, context/, manifest/ from cwd)
          cd _site
          node ../rdf-build-scripts/generate-index-pages.js
          cd ..

          # Copy hand-authored landing pages
          cp website/index.html _site/index.html
          cp website/docs-index.html _site/docs-index.html

          # Copy JSON Schema profiles so they resolve under /schema-profiles/
          mkdir -p _site/schema-profiles
          cp validation-and-conversion/schemas/schema-profiles/*.json _site/schema-profiles/
          cp validation-and-conversion/schemas/schema-profiles/*.jsonld _site/schema-profiles/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
